apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hermes

# Core app only — applies cleanly with `kubectl apply -k k8s/` on any cluster.
# servicemonitor.yaml is intentionally excluded (it needs the Prometheus
# Operator CRDs); apply it separately after installing kube-prometheus-stack.
# The Secret is created imperatively from .env.local — see k8s/README.md.
resources:
  - namespace.yaml
  - configmap.yaml
  - service.yaml
  - statefulset.yaml
