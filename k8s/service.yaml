apiVersion: v1
kind: Service
metadata:
  name: hermes-trader
  namespace: hermes
  labels:
    app: hermes-trader
spec:
  # Headless (clusterIP: None) — this is the StatefulSet's governing service and
  # gives the single pod a stable network identity. Scrape + port-forward both
  # resolve through it on the named `http` port.
  clusterIP: None
  selector:
    app: hermes-trader
  ports:
    - name: http
      port: 8000
      targetPort: http
