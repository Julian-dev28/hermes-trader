# Reference only — DO NOT commit a filled-in copy.
#
# Preferred: create the Secret straight from your gitignored .env.local so keys
# never touch a tracked file:
#
#   kubectl create secret generic hermes-secrets -n hermes \
#     --from-literal=OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
#     --from-literal=HYPERLIQUID_WALLET_ADDRESS="$HYPERLIQUID_WALLET_ADDRESS" \
#     --from-literal=HYPERLIQUID_PRIVATE_KEY="$HYPERLIQUID_PRIVATE_KEY" \
#     --from-literal=HERMES_OPERATOR_TOKEN="$(openssl rand -hex 16)"
#
# For a pure screenshot demo you can use dummy values — the bot boots in OFF
# mode and serves the dashboard without placing trades.
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  namespace: hermes
type: Opaque
stringData:
  OPENROUTER_API_KEY: "sk-or-REPLACE_ME"
  HYPERLIQUID_WALLET_ADDRESS: "0xREPLACE_ME"
  HYPERLIQUID_PRIVATE_KEY: "0xREPLACE_ME"
  HERMES_OPERATOR_TOKEN: "REPLACE_ME"
